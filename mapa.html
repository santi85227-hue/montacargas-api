<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa Técnicos</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
}

#map{
    width:100%;
    height:100vh;
}

.topbar{
    position:absolute;
    top:20px;
    left:20px;
    z-index:1000;
}

.btn{
    background:#2563eb;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
}

.popup{
    font-size:14px;
}

</style>

</head>

<body>

<div class="topbar">

    <a href="/" class="btn">
        ← Inicio
    </a>

</div>

<div id="map"></div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyCWxAs_JLDo0tX80wMe1rlHFx6hCU79DwQ",

  authDomain: "montacargas-tecnicos.firebaseapp.com",

  projectId: "montacargas-tecnicos",

  storageBucket: "montacargas-tecnicos.firebasestorage.app",

  messagingSenderId: "321697235731",

  appId: "1:321697235731:web:d54b1bf957d3a95641d0e6"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// =======================
// MAPA
// =======================

const map = L.map('map').setView([3.4516, -76.5320], 12);

// OpenStreetMap
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);

// =======================
// MARCADORES
// =======================

let markers = [];

// =======================
// LEER ORDENES
// =======================

onSnapshot(collection(db, "ordenes"), (snapshot) => {

    markers.forEach(m => map.removeLayer(m));

    markers = [];

    snapshot.forEach((docu) => {

        const data = docu.data();

        if(data.lat && data.lng){

            const marker = L.marker([
                data.lat,
                data.lng
            ]).addTo(map);

            marker.bindPopup(`

                <div class="popup">

                    <strong>Cliente:</strong>
                    ${data.clienteNombre || "-"}<br>

                    <strong>Estado:</strong>
                    ${data.estado || "-"}<br>

                    <strong>Técnico:</strong>
                    ${data.tecnico || "-"}<br>

                    <strong>Equipo:</strong>
                    ${data.serial || "-"}

                </div>

            `);

            markers.push(marker);
        }

    });

});

// =======================
// LEER POSICION TECNICO
// =======================
    
let markersTecnicos = [];

    const clienteIcon = L.icon({

    iconUrl:
    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',

    shadowUrl:
    'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',

    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]

});

onSnapshot(collection(db, "tecnicos"), (snapshot) => {

    markersTecnicos.forEach(m => map.removeLayer(m));

    markersTecnicos = [];

    snapshot.forEach((docu) => {

        const data = docu.data();

        if(data.latitud && data.longitud){

        const marker = L.marker([
            data.latitud,
            data.longitud
        ],{
            icon: clienteIcon
        }

).addTo(map);

            marker.bindPopup(`

                <div class="popup">

                    <strong>Técnico:</strong>
                    ${data.tecnicoNombre}<br>

                    <strong>Velocidad:</strong>
                    ${data.velocidad || 0} m/s

                </div>

            `);

            markersTecnicos.push(marker);

        }

    });

});

</script>

</body>

</html>
