<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamiento de Mantenimiento</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#1f2937;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.card h2{
    margin-bottom:15px;
    color:#2563eb;
}

.forklift-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

.forklift-card{
    border:2px solid #e5e7eb;
    border-radius:12px;
    padding:16px;
    cursor:pointer;
    transition:0.3s;
}

.forklift-card:hover{
    border-color:#2563eb;
    transform:translateY(-2px);
}

.forklift-card.selected{
    border-color:#2563eb;
    background:#eff6ff;
}

.modelo{
    font-size:18px;
    font-weight:bold;
    color:#111827;
}

.serie{
    margin-top:8px;
    color:#4b5563;
}

.ubicacion{
    margin-top:5px;
    color:#6b7280;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    margin-top:20px;
}

.day{
    background:white;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.day:hover{
    background:#dbeafe;
}

.day.selected{
    background:#2563eb;
    color:white;
}

.time-slots{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-top:20px;
}

.time-slot{
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.time-slot:hover{
    background:#dbeafe;
}

.time-slot.selected{
    background:#2563eb;
    color:white;
}

.time-slot.ocupado{
    background:#d1d5db;
    color:#6b7280;
    cursor:not-allowed;
    opacity:0.5;
}

.btn{
    margin-top:20px;
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
    width:100%;
}

.btn:hover{
    background:#1d4ed8;
}

.summary{
    background:#f9fafb;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.notification{
    position:fixed;
    top:20px;
    right:20px;
    background:#16a34a;
    color:white;
    padding:16px 20px;
    border-radius:10px;
    display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🔧 Agendamiento de Mantenimiento</h1>

<div class="card">

<h2>1. Selecciona el equipo</h2>

<div class="forklift-grid" id="forkliftList"></div>

</div>

<div class="card">

<h2>2. Selecciona el día</h2>

<div class="calendar" id="calendar"></div>

</div>

<div class="card">

<h2>3. Selecciona la hora</h2>

<div class="time-slots" id="timeSlots"></div>

</div>

<div class="card">

<h2>4. Confirmación</h2>

<div class="summary" id="summary">

Seleccione información...

</div>

<button class="btn" onclick="confirmarMantenimiento()">

CONFIRMAR MANTENIMIENTO

</button>

</div>

</div>

<div class="notification" id="notification"></div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  getDocs,
  addDoc,
  onSnapshot

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===================================== */
/* FIREBASE */
/* ===================================== */

const firebaseConfig = {

  apiKey: "AIzaSyCWxAs_JLDo0tX80wMe1rlHFx6hCU79DwQ",

  authDomain: "montacargas-tecnicos.firebaseapp.com",

  projectId: "montacargas-tecnicos",

  storageBucket: "montacargas-tecnicos.firebasestorage.app",

  messagingSenderId: "321697235731",

  appId: "1:321697235731:web:d54b1bf957d3a95641d0e6"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ===================================== */
/* VARIABLES */
/* ===================================== */

let montacargas = [];

let selectedForklift = null;

let selectedDate = null;

let selectedTime = null;

/* ===================================== */
/* CARGAR EQUIPOS */
/* ===================================== */

async function cargarEquipos(){

  const querySnapshot =
    await getDocs(collection(db, "EQUIPOS"));

  montacargas = [];

  querySnapshot.forEach((docu) => {

    montacargas.push({

      id: docu.id,

      ...docu.data()

    });

  });

  renderForklifts();
}

cargarEquipos();

/* ===================================== */
/* MOSTRAR EQUIPOS */
/* ===================================== */

function renderForklifts(){

  const container =
    document.getElementById("forkliftList");

  container.innerHTML = "";

  montacargas.forEach((f) => {

    container.innerHTML += `

      <div
        class="forklift-card"
        id="equipo-${f.id}"
      >

        <div class="modelo">
          ${f.Modelo || "-"}
        </div>

        <div class="serie">
          SERIAL: ${f.id}
        </div>

        <div class="ubicacion">
          📍 ${f.Ubicacion || "-"}
        </div>

      </div>

    `;
  });

  montacargas.forEach((f) => {

    document
      .getElementById(`equipo-${f.id}`)
      .addEventListener("click", () => {

        document
          .querySelectorAll(".forklift-card")
          .forEach((card) => {

            card.classList.remove("selected");

          });

        document
          .getElementById(`equipo-${f.id}`)
          .classList.add("selected");

        selectedForklift = f;

        actualizarResumen();
      });
  });
}

/* ===================================== */
/* CALENDARIO */
/* ===================================== */

const calendar =
  document.getElementById("calendar");

for(let i=1; i<=30; i++){

  const day =
    document.createElement("div");

  day.className = "day";

  day.innerText = i;

  day.addEventListener("click", async () => {

    document
      .querySelectorAll(".day")
      .forEach((d) => {

        d.classList.remove("selected");

      });

    day.classList.add("selected");

    selectedDate =
      `2026-05-${String(i).padStart(2,'0')}`;

    actualizarResumen();

    await cargarHorariosOcupados();
  });

  calendar.appendChild(day);
}

/* ===================================== */
/* HORARIOS */
/* ===================================== */

const horas = [

  "08:00",
  "09:00",
  "10:00",
  "11:00",
  "14:00",
  "15:00",
  "16:00"

];

const timeSlots =
  document.getElementById("timeSlots");

horas.forEach((hora) => {

  const div =
    document.createElement("div");

  div.className = "time-slot";

  div.dataset.hora = hora;

  div.innerText = hora;

  div.addEventListener("click", () => {

    if(div.classList.contains("ocupado")){
      return;
    }

    document
      .querySelectorAll(".time-slot")
      .forEach((t) => {

        t.classList.remove("selected");

      });

    div.classList.add("selected");

    selectedTime = hora;

    actualizarResumen();
  });

  timeSlots.appendChild(div);
});

/* ===================================== */
/* RESUMEN */
/* ===================================== */

function actualizarResumen(){

  const summary =
    document.getElementById("summary");

  summary.innerHTML = `

    <p>
      <strong>Equipo:</strong>
      ${selectedForklift?.Modelo || "-"}
    </p>

    <p>
      <strong>Serial:</strong>
      ${selectedForklift?.id || "-"}
    </p>

    <p>
      <strong>Fecha:</strong>
      ${selectedDate || "-"}
    </p>

    <p>
      <strong>Hora:</strong>
      ${selectedTime || "-"}
    </p>

  `;
}

/* ===================================== */
/* HORARIOS OCUPADOS */
/* ===================================== */

async function cargarHorariosOcupados(){

  document
    .querySelectorAll(".time-slot")
    .forEach((btn) => {

      btn.classList.remove("ocupado");

      btn.style.pointerEvents = "auto";
    });

  const snapshot =
    await getDocs(collection(db, "AGENDAMIENTOS"));

  snapshot.forEach((docu) => {

    const data = docu.data();

    if(data.fecha === selectedDate){

      document
        .querySelectorAll(".time-slot")
        .forEach((btn) => {

          if(btn.dataset.hora === data.hora){

            btn.classList.add("ocupado");

            btn.style.pointerEvents = "none";
          }
        });
    }
  });
}

/* ===================================== */
/* GUARDAR AGENDAMIENTO */
/* ===================================== */

window.confirmarMantenimiento =
async function(){

  if(
    !selectedForklift ||
    !selectedDate ||
    !selectedTime
  ){

    alert("Complete toda la información");

    return;
  }

  try{

    await addDoc(

      collection(db, "AGENDAMIENTOS"),

      {

        equipo: selectedForklift.id,

        modelo: selectedForklift.Modelo || "",

        fecha: selectedDate,

        hora: selectedTime,

        estado: "PENDIENTE",

        fechaCreacion:
          new Date().toISOString()

      }
    );

    mostrarNotificacion(
      "Mantenimiento agendado correctamente"
    );

    selectedTime = null;

    actualizarResumen();

    cargarHorariosOcupados();

  }catch(error){

    console.log(error);

    alert("ERROR GUARDANDO");
  }
}

/* ===================================== */
/* NOTIFICACION */
/* ===================================== */

function mostrarNotificacion(texto){

  const n =
    document.getElementById("notification");

  n.innerText = texto;

  n.style.display = "block";

  setTimeout(() => {

    n.style.display = "none";

  }, 3000);
}

/* ===================================== */
/* ACTUALIZACION AUTOMATICA */
/* ===================================== */

onSnapshot(
  collection(db, "AGENDAMIENTOS"),
  () => {

    if(selectedDate){

      cargarHorariosOcupados();
    }
  }
);

</script>

</body>
</html>
