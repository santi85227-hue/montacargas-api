<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  doc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===================================== */
/* FIREBASE */
/* ===================================== */

const firebaseConfig = { apiKey: "AIzaSyCWxAs_JLDo0tX80wMe1rlHFx6hCU79DwQ", authDomain: "montacargas-tecnicos.firebaseapp.com", projectId: "montacargas-tecnicos", storageBucket: "montacargas-tecnicos.firebasestorage.app", messagingSenderId: "321697235731", appId: "1:321697235731:web:d54b1bf957d3a95641d0e6" };

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ===================================== */
/* VARIABLES */
/* ===================================== */

let montacargas = [];
let agendamientos = [];

let selectedForklift = null;
let selectedDate = null;
let selectedTime = null;

let editandoAgenda = null;

const YEAR = 2026;
const MONTH = 4; // MAYO

/* ===================================== */
/* CARGAR DATOS */
/* ===================================== */

async function cargarDatos(){

  await cargarEquipos();

  await cargarAgendamientos();

  renderForklifts();

  renderCalendario();

}

cargarDatos();

/* ===================================== */
/* EQUIPOS */
/* ===================================== */

async function cargarEquipos(){

  const snapshot =
    await getDocs(collection(db, "Equipos"));

  montacargas = [];

  snapshot.forEach((docu) => {

    montacargas.push({

      id: docu.id,
      ...docu.data()

    });

  });

}

/* ===================================== */
/* AGENDAMIENTOS */
/* ===================================== */

async function cargarAgendamientos(){

  const snapshot =
    await getDocs(collection(db, "AGENDAMIENTO"));

  agendamientos = [];

  snapshot.forEach((docu) => {

    agendamientos.push({

      firebaseId: docu.id,
      ...docu.data()

    });

  });

}

/* ===================================== */
/* EQUIPOS DISPONIBLES */
/* ===================================== */

function renderForklifts(){

  const container =
    document.getElementById("forkliftList");

  container.innerHTML = "";

  const disponibles =
    montacargas.filter((f) => {

      const agenda =
        agendamientos.find(
          a => a.serie === f.Serie
        );

      return !agenda;

    });

  if(disponibles.length === 0){

    container.innerHTML =
      `<div class="sin-equipos">
        No existen equipos disponibles
      </div>`;

    return;
  }

  disponibles.forEach((f) => {

    container.innerHTML += `

      <div
        class="forklift-card"
        id="equipo-${f.Serie}"
      >

        <div class="modelo">
          ${f.Modelo}
        </div>

        <div class="serie">
          SERIAL: ${f.Serie}
        </div>

        <div class="info">
          Royal: ${f.Royal || "-"}
        </div>

      </div>

    `;

  });

  disponibles.forEach((f) => {

    const card =
      document.getElementById(`equipo-${f.Serie}`);

    card.addEventListener("click", () => {

      document
        .querySelectorAll(".forklift-card")
        .forEach(c => {

          c.classList.remove("selected");

        });

      card.classList.add("selected");

      selectedForklift = f;

      editandoAgenda = null;

      actualizarResumen();

    });

  });

}

/* ===================================== */
/* CALENDARIO REAL */
/* ===================================== */

function renderCalendario(){

  const calendar =
    document.getElementById("calendar");

  calendar.innerHTML = "";

  const diasSemana = [
    "LUN",
    "MAR",
    "MIE",
    "JUE",
    "VIE",
    "SAB",
    "DOM"
  ];

  diasSemana.forEach((d) => {

    calendar.innerHTML += `
      <div
        style="
          font-weight:bold;
          text-align:center;
          padding:10px;
        "
      >
        ${d}
      </div>
    `;

  });

  const primerDia =
    new Date(YEAR, MONTH, 1);

  let inicioSemana =
    primerDia.getDay();

  inicioSemana =
    inicioSemana === 0
    ? 6
    : inicioSemana - 1;

  for(let i=0; i<inicioSemana; i++){

    calendar.innerHTML += `<div></div>`;

  }

  const ultimoDia =
    new Date(YEAR, MONTH + 1, 0).getDate();

  for(let dia=1; dia<=ultimoDia; dia++){

    const fechaTexto =
      `${YEAR}-${String(MONTH + 1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;

    const agendas =
      agendamientos.filter((a) => {

        if(!a.fecha?.seconds) return false;

        const fecha =
          new Date(a.fecha.seconds * 1000);

        return fecha.toISOString().split("T")[0]
          === fechaTexto;

      });

    const div =
      document.createElement("div");

    div.className = "day";

    div.id = `dia-${dia}`;

    if(agendas.length > 0){

      div.classList.add("ocupado");

    }

    div.innerHTML = `

      <div class="day-numero">
        ${dia}
      </div>

      <div class="day-agenda">
        ${agendas.length} agenda(s)
      </div>

    `;

    div.addEventListener("click", () => {

      document
        .querySelectorAll(".day")
        .forEach((d) => {

          d.classList.remove("selected");

        });

      div.classList.add("selected");

      selectedDate = fechaTexto;

      selectedTime = null;

      document
        .querySelectorAll(".time-slot")
        .forEach((t) => {

          t.classList.remove("selected");

        });

      actualizarResumen();

      mostrarAgendaDelDia(fechaTexto);

      cargarHorariosOcupados();

    });

    calendar.appendChild(div);

  }

}

/* ===================================== */
/* HORARIOS */
/* ===================================== */

const horas = [
  "08:00",
  "09:00",
  "10:00",
  "11:00",
  "14:00",
  "15:00",
  "16:00"
];

const timeSlots =
  document.getElementById("timeSlots");

timeSlots.innerHTML = "";

horas.forEach((hora) => {

  const div =
    document.createElement("div");

  div.className = "time-slot";

  div.dataset.hora = hora;

  div.innerText = hora;

  div.addEventListener("click", () => {

    if(div.classList.contains("ocupado")){
      return;
    }

    document
      .querySelectorAll(".time-slot")
      .forEach((t) => {

        t.classList.remove("selected");

      });

    div.classList.add("selected");

    selectedTime = hora;

    actualizarResumen();

  });

  timeSlots.appendChild(div);

});

/* ===================================== */
/* BLOQUEAR HORAS */
/* ===================================== */

function cargarHorariosOcupados(){

  document
    .querySelectorAll(".time-slot")
    .forEach((btn) => {

      btn.classList.remove("ocupado");

      btn.style.pointerEvents = "auto";

    });

  agendamientos.forEach((a) => {

    if(!a.fecha?.seconds) return;

    const fecha =
      new Date(a.fecha.seconds * 1000);

    const fechaAgenda =
      fecha.toISOString().split("T")[0];

    if(fechaAgenda === selectedDate){

      if(
        editandoAgenda &&
        a.firebaseId === editandoAgenda.firebaseId
      ){
        return;
      }

      document
        .querySelectorAll(".time-slot")
        .forEach((btn) => {

          if(btn.dataset.hora === a.hora){

            btn.classList.add("ocupado");

            btn.style.pointerEvents = "none";

          }

        });

    }

  });

}

/* ===================================== */
/* PROGRAMACION DEL DIA */
/* ===================================== */

function mostrarAgendaDelDia(fechaTexto){

  const container =
    document.getElementById("agendaDia");

  const agendas =
    agendamientos.filter((a) => {

      if(!a.fecha?.seconds) return false;

      const fecha =
        new Date(a.fecha.seconds * 1000);

      return fecha.toISOString().split("T")[0]
        === fechaTexto;

    });

  if(agendas.length === 0){

    container.innerHTML = `
      <div class="sin-equipos">
        No existen programaciones
      </div>
    `;

    return;
  }

  agendas.sort((a,b) =>
    a.hora.localeCompare(b.hora)
  );

  container.innerHTML = "";

  agendas.forEach((a) => {

    container.innerHTML += `

      <div
        class="agenda-item"
        id="agenda-${a.firebaseId}"
        style="cursor:pointer"
      >

        <h3>${a.hora}</h3>

        <p>
          <strong>Serie:</strong>
          ${a.serie}
        </p>

        <p>
          <strong>Modelo:</strong>
          ${a.modelo}
        </p>

        <p>
          <strong>Estado:</strong>
          ${a.estado}
        </p>

        <p style="color:#2563eb">
          CLICK PARA EDITAR
        </p>

      </div>

    `;

  });

  agendas.forEach((a) => {

    const card =
      document.getElementById(
        `agenda-${a.firebaseId}`
      );

    card.addEventListener("click", async () => {

      const equipo =
        montacargas.find(
          e => e.Serie === a.serie
        );

      if(!equipo) return;

      editandoAgenda = a;

      selectedForklift = equipo;

      selectedTime = a.hora;

      const fecha =
        new Date(a.fecha.seconds * 1000);

      selectedDate =
        fecha.toISOString().split("T")[0];

      actualizarResumen();

      document
        .querySelectorAll(".time-slot")
        .forEach((t) => {

          t.classList.remove("selected");

          if(t.dataset.hora === a.hora){

            t.classList.add("selected");

          }

        });

      cargarHorariosOcupados();

      mostrarNotificacion(
        "Modo edición activado"
      );

    });

  });

}

/* ===================================== */
/* RESUMEN */
/* ===================================== */

function actualizarResumen(){

  document.getElementById("summary")
  .innerHTML = `

    <p>
      <strong>Equipo:</strong>
      ${selectedForklift?.Modelo || "-"}
    </p>

    <p>
      <strong>Serie:</strong>
      ${selectedForklift?.Serie || "-"}
    </p>

    <p>
      <strong>Fecha:</strong>
      ${selectedDate || "-"}
    </p>

    <p>
      <strong>Hora:</strong>
      ${selectedTime || "-"}
    </p>

  `;

}

/* ===================================== */
/* GUARDAR */
/* ===================================== */

window.confirmarMantenimiento =
async function(){

  if(
    !selectedForklift ||
    !selectedDate ||
    !selectedTime
  ){

    alert("Complete toda la información");

    return;

  }

  try{

    if(editandoAgenda){

      await updateDoc(

        doc(
          db,
          "AGENDAMIENTO",
          editandoAgenda.firebaseId
        ),

        {

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora: selectedTime

        }

      );

      mostrarNotificacion(
        "Programación actualizada"
      );

    }else{

      await addDoc(

        collection(db, "AGENDAMIENTO"),

        {

          serie:
            selectedForklift.Serie,

          modelo:
            selectedForklift.Modelo,

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora:
            selectedTime,

          estado:
            "PENDIENTE",

          fechaCreacion:
            new Date()

        }

      );

      mostrarNotificacion(
        "Programación creada"
      );

    }

    selectedForklift = null;
    selectedDate = null;
    selectedTime = null;
    editandoAgenda = null;

    actualizarResumen();

    await cargarDatos();

  }catch(error){

    console.log(error);

    alert("ERROR GUARDANDO");

  }

}

/* ===================================== */
/* NOTIFICACION */
/* ===================================== */

function mostrarNotificacion(texto){

  const n =
    document.getElementById("notification");

  n.innerText = texto;

  n.style.display = "block";

  setTimeout(() => {

    n.style.display = "none";

  }, 3000);

}

/* ===================================== */
/* TIEMPO REAL */
/* ===================================== */

onSnapshot(
  collection(db, "AGENDAMIENTO"),
  async () => {

    await cargarDatos();

  }
);

</script>
