<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamiento de Mantenimiento</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#1f2937;
}

.container{
    max-width:1400px;
    margin:auto;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.card h2{
    margin-bottom:15px;
    color:#2563eb;
}

.forklift-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.forklift-card{
    border:2px solid #e5e7eb;
    border-radius:12px;
    padding:16px;
    cursor:pointer;
    transition:0.3s;
    background:white;
}

.forklift-card:hover{
    border-color:#2563eb;
    transform:translateY(-2px);
}

.forklift-card.selected{
    border-color:#2563eb;
    background:#eff6ff;
}

.modelo{
    font-size:18px;
    font-weight:bold;
    color:#111827;
}

.serie{
    margin-top:8px;
    color:#4b5563;
}

.info{
    margin-top:5px;
    color:#6b7280;
    font-size:14px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    margin-top:20px;
}

.calendar-header{
    text-align:center;
    font-weight:bold;
    padding:10px;
    color:#2563eb;
}

.day{
    background:white;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    min-height:90px;
}

.day:hover{
    background:#dbeafe;
}

.day.selected{
    background:#2563eb;
    color:white;
}

.day.ocupado{
    border:2px solid #16a34a;
}

.day-numero{
    font-size:18px;
    font-weight:bold;
}

.day-agenda{
    margin-top:8px;
    font-size:11px;
    color:#16a34a;
    font-weight:bold;
}

.time-slots{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-top:20px;
}

.time-slot{
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    background:white;
}

.time-slot:hover{
    background:#dbeafe;
}

.time-slot.selected{
    background:#2563eb;
    color:white;
}

.time-slot.ocupado{
    background:#d1d5db;
    color:#6b7280;
    cursor:not-allowed;
    opacity:0.6;
}

.btn{
    margin-top:20px;
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
    width:100%;
    text-decoration:none;
    display:inline-block;
    text-align:center;
}

.btn:hover{
    background:#1d4ed8;
}

.summary{
    background:#f9fafb;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.notification{
    position:fixed;
    top:20px;
    right:20px;
    background:#16a34a;
    color:white;
    padding:16px 20px;
    border-radius:10px;
    display:none;
    z-index:999;
}

.agenda-item{
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:15px;
    margin-bottom:10px;
    background:#ffffff;
    cursor:pointer;
    transition:0.3s;
}

.agenda-item:hover{
    border-color:#2563eb;
    background:#eff6ff;
}

.agenda-item h3{
    color:#2563eb;
    margin-bottom:8px;
}

.sin-equipos{
    text-align:center;
    padding:20px;
    color:#6b7280;
}

</style>

</head>

<body>

<div class="container">

<h1>🔧 Agendamiento de Mantenimiento</h1>

<div class="card">
    <h2>🏢 Seleccionar Cliente</h2>
    <select
        id="clienteSelect"
        style="
            width:100%;
            padding:14px;
            border-radius:10px;
            border:1px solid #d1d5db;
            font-size:16px;
        "
    >
    </select>
</div>

<div class="card">

<h2>1. Equipos Disponibles</h2>

<div class="forklift-grid" id="forkliftList"></div>

</div>

<div class="card">

<h2>2. Calendario de Programación</h2>

<div class="calendar" id="calendar"></div>

</div>

<div class="card">

<h2>📅 Programación del Día</h2>

<div id="agendaDia">

Seleccione un día del calendario

</div>

</div>

<div class="card">

<h2>3. Seleccionar Hora</h2>

<div class="time-slots" id="timeSlots"></div>

</div>

<div class="card">

<h2>4. Confirmación</h2>

<div class="summary" id="summary">

Seleccione información...

</div>

<button
  class="btn"
  id="btnGuardar"
  onclick="confirmarMantenimiento()"
>

CONFIRMAR MANTENIMIENTO

</button>

</div>

</div>

<div class="notification" id="notification"></div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  doc,
  onSnapshot

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===================================== */
/* FIREBASE */
/* ===================================== */

const firebaseConfig = {

  apiKey: "AIzaSyCWxAs_JLDo0tX80wMe1rlHFx6hCU79DwQ",

  authDomain: "montacargas-tecnicos.firebaseapp.com",

  projectId: "montacargas-tecnicos",

  storageBucket: "montacargas-tecnicos.firebasestorage.app",

  messagingSenderId: "321697235731",

  appId: "1:321697235731:web:d54b1bf957d3a95641d0e6"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ===================================== */
/* VARIABLES */
/* ===================================== */

let montacargas = [];

let agendamientos = [];

let selectedForklift = null;

let selectedDate = null;

let selectedTime = null;

let agendamientoEditando = null;

let clienteSeleccionado = "TODOS";

/* ===================================== */
/* CARGAR DATOS */
/* ===================================== */

async function cargarDatos(){

  await cargarEquipos();

  await cargarAgendamientos();

  renderClientes();
    
  renderForklifts();

  renderCalendario();
}

cargarDatos();

/* ===================================== */
/* EQUIPOS */
/* ===================================== */

async function cargarEquipos(){

  const snapshot =
    await getDocs(collection(db, "Equipos"));

  montacargas = [];

  snapshot.forEach((docu) => {

    montacargas.push({

      id: docu.id,

      ...docu.data()

    });

  });
}

/* ===================================== */
/* AGENDAMIENTOS */
/* ===================================== */

async function cargarAgendamientos(){

  const snapshot =
    await getDocs(collection(db, "AGENDAMIENTO"));

  agendamientos = [];

  snapshot.forEach((docu) => {

    agendamientos.push({

      firebaseId: docu.id,

      ...docu.data()

    });

  });
}

/* ===================================== */
/* MOSTRAR EQUIPOS */
/* ===================================== */

function renderForklifts(){

  const container =
    document.getElementById("forkliftList");

  container.innerHTML = "";

  const equiposDisponibles =
    montacargas.filter((f) => {

      // FILTRO CLIENTE
      if(
        clienteSeleccionado !== "TODOS" &&
        f.Cliente !== clienteSeleccionado
      ){
        return false;
      }

      // VALIDAR SI YA ESTA AGENDADO
      const yaExiste =
        agendamientos.find(
          a => a.serie === f.Serie
        );

      return !yaExiste;
    });

  if(equiposDisponibles.length === 0){

    container.innerHTML = `

      <div class="sin-equipos">

        No existen equipos disponibles

      </div>

    `;

    return;
  }

  equiposDisponibles.forEach((f) => {

    container.innerHTML += `

      <div
        class="forklift-card"
        id="equipo-${f.Serie}"
      >

        <div class="modelo">
          ${f.Modelo || "-"}
        </div>

        <div class="serie">
          SERIAL: ${f.Serie}
        </div>

        <div class="info">
          Cliente: ${f.Cliente || "-"}
        </div>

        <div class="info">
          Estado: ${f.Estado || "-"}
        </div>

      </div>

    `;
  });

  equiposDisponibles.forEach((f) => {

    const card =
      document.getElementById(
        `equipo-${f.Serie}`
      );

    if(!card) return;

    card.addEventListener("click", () => {

      document
        .querySelectorAll(".forklift-card")
        .forEach((c) => {

          c.classList.remove("selected");
        });

      card.classList.add("selected");

      selectedForklift = f;

      agendamientoEditando = null;

      actualizarResumen();
    });
  });
}
/* ===================================== */
/* CALENDARIO */
/* ===================================== */

function renderCalendario(){

  const calendar =
    document.getElementById("calendar");

  calendar.innerHTML = "";

  const year = 2026;

  const month = 4;

  const primerDia =
    new Date(year, month, 1);

  const ultimoDia =
    new Date(year, month + 1, 0);

  const diasMes =
    ultimoDia.getDate();

  let inicioSemana =
    primerDia.getDay();

  if(inicioSemana === 0){
    inicioSemana = 7;
  }

  const nombresDias = [
    "Lun",
    "Mar",
    "Mié",
    "Jue",
    "Vie",
    "Sáb",
    "Dom"
  ];

  nombresDias.forEach((nombre) => {

    const header =
      document.createElement("div");

    header.className =
      "calendar-header";

    header.innerText = nombre;

    calendar.appendChild(header);

  });

  // ESPACIOS VACIOS
  for(let i = 1; i < inicioSemana; i++){

    const empty =
      document.createElement("div");

    calendar.appendChild(empty);
  }

  // DIAS DEL MES
  for(let dia = 1; dia <= diasMes; dia++){

    const fechaTexto =
      `2026-05-${String(dia).padStart(2,'0')}`;

    const agendasDia =
      agendamientos.filter((a) => {

        if(!a.fecha?.seconds){
          return false;
        }

        const fecha =
          new Date(a.fecha.seconds * 1000);

        const fechaAgenda =
          fecha.toISOString().split("T")[0];

        // FILTRO CLIENTE
        if(clienteSeleccionado !== "TODOS"){

          const equipo =
            montacargas.find(
              e => e.Serie === a.serie
            );

          if(
            !equipo ||
            equipo.Cliente !== clienteSeleccionado
          ){
            return false;
          }
        }

        return fechaAgenda === fechaTexto;
      });

    const day =
      document.createElement("div");

    day.className = "day";

    day.id = `dia-${dia}`;

    if(agendasDia.length > 0){
      day.classList.add("ocupado");
    }

    day.innerHTML = `
      <div class="day-numero">
        ${dia}
      </div>

      <div class="day-agenda">
        ${agendasDia.length} agenda(s)
      </div>
    `;

    day.addEventListener("click", () => {

      document
        .querySelectorAll(".day")
        .forEach((d) => {
          d.classList.remove("selected");
        });

      day.classList.add("selected");

      selectedDate = fechaTexto;

      selectedTime = null;

      document
        .querySelectorAll(".time-slot")
        .forEach((t) => {
          t.classList.remove("selected");
        });

      actualizarResumen();

      mostrarAgendaDelDia(fechaTexto);

      cargarHorariosOcupados();
    });

    calendar.appendChild(day);
  }
}
/* ===================================== */
/* HORARIOS */
/* ===================================== */

const horas = [

  "08:00",
  "09:00",
  "10:00",
  "11:00",
  "14:00",
  "15:00",
  "16:00"

];

const timeSlots =
  document.getElementById("timeSlots");

horas.forEach((hora) => {

  const div =
    document.createElement("div");

  div.className = "time-slot";

  div.dataset.hora = hora;

  div.innerText = hora;

  div.addEventListener("click", () => {

    if(div.classList.contains("ocupado")){

      return;
    }

    document
      .querySelectorAll(".time-slot")
      .forEach((t) => {

        t.classList.remove("selected");
      });

    div.classList.add("selected");

    selectedTime = hora;

    actualizarResumen();
  });

  timeSlots.appendChild(div);
});

/* ===================================== */
/* BLOQUEAR HORARIOS */
/* ===================================== */

function cargarHorariosOcupados(){

  document
    .querySelectorAll(".time-slot")
    .forEach((btn) => {

      btn.classList.remove("ocupado");

      btn.style.pointerEvents = "auto";
    });

  agendamientos.forEach((a) => {

    if(!a.fecha?.seconds) return;

    const fecha =
      new Date(a.fecha.seconds * 1000);

    const fechaAgenda =
      fecha.toISOString().split("T")[0];

    if(fechaAgenda === selectedDate){

      if(
        agendamientoEditando &&
        a.firebaseId === agendamientoEditando.firebaseId
      ){
        return;
      }

      document
        .querySelectorAll(".time-slot")
        .forEach((btn) => {

          if(btn.dataset.hora === a.hora){

            btn.classList.add("ocupado");

            btn.style.pointerEvents = "none";
          }
        });
    }
  });
}

/* ===================================== */
/* PROGRAMACION DEL DIA */
/* ===================================== */

function mostrarAgendaDelDia(fechaTexto){

  const container =
    document.getElementById("agendaDia");

  const agendasDelDia = [];

  agendamientos.forEach((a) => {

    if(!a.fecha?.seconds){
      return;
    }

    const fecha =
      new Date(a.fecha.seconds * 1000);

    const fechaAgenda =
      fecha.toISOString().split("T")[0];

    if(fechaAgenda === fechaTexto){

      // FILTRO CLIENTE
      if(clienteSeleccionado !== "TODOS"){

        const equipo =
          montacargas.find(
            e => e.Serie === a.serie
          );

        if(
          !equipo ||
          equipo.Cliente !== clienteSeleccionado
        ){
          return;
        }
      }

      agendasDelDia.push(a);
    }
  });

  if(agendasDelDia.length === 0){

    container.innerHTML = `
      <div class="sin-equipos">
        No existen mantenimientos programados
      </div>
    `;

    return;
  }

  agendasDelDia.sort((a,b) => {
    return a.hora.localeCompare(b.hora);
  });

  container.innerHTML = "";

  agendasDelDia.forEach((a) => {

    container.innerHTML += `
      <div
        class="agenda-item"
        id="agenda-${a.firebaseId}"
      >

        <h3>${a.hora}</h3>

        <p>
          <strong>Serie:</strong>
          ${a.serie}
        </p>

        <p>
          <strong>Modelo:</strong>
          ${a.modelo}
        </p>

        <p>
          <strong>Estado:</strong>
          ${a.estado}
        </p>

        <p style="
          margin-top:10px;
          color:#2563eb;
        ">
          CLICK PARA MODIFICAR
        </p>

      </div>
    `;
  });

  agendasDelDia.forEach((a) => {

    const card =
      document.getElementById(
        `agenda-${a.firebaseId}`
      );

    if(!card){
      return;
    }

    card.addEventListener("click", () => {

      const equipo =
        montacargas.find(
          e => e.Serie === a.serie
        );

      if(!equipo){
        return;
      }

      selectedForklift = equipo;

      agendamientoEditando = a;

      const fecha =
        new Date(a.fecha.seconds * 1000);

      selectedDate =
        fecha.toISOString().split("T")[0];

      selectedTime = a.hora;

      document
        .querySelectorAll(".time-slot")
        .forEach((t) => {

          t.classList.remove("selected");

          if(t.dataset.hora === a.hora){
            t.classList.add("selected");
          }
        });

      document
        .querySelectorAll(".day")
        .forEach((d) => {
          d.classList.remove("selected");
        });

      const dia =
        fecha.getDate();

      const diaElemento =
        document.getElementById(
          `dia-${dia}`
        );

      if(diaElemento){
        diaElemento.classList.add("selected");
      }

      actualizarResumen();

      cargarHorariosOcupados();

      mostrarNotificacion(
        "Programación cargada para edición"
      );
    });
  });
}
/* ===================================== */
/* RESUMEN */
/* ===================================== */

function actualizarResumen(){

  const summary =
    document.getElementById("summary");

  summary.innerHTML = `
    <p>
      <strong>Equipo:</strong>
      ${selectedForklift?.Modelo || "-"}
    </p>

    <p>
      <strong>Serie:</strong>
      ${selectedForklift?.Serie || "-"}
    </p>

    <p>
      <strong>Fecha:</strong>
      ${selectedDate || "-"}
    </p>

    <p>
      <strong>Hora:</strong>
      ${selectedTime || "-"}
    </p>
  `;

  const btn =
    document.getElementById("btnGuardar");

  if(agendamientoEditando){

    btn.innerText =
      "ACTUALIZAR PROGRAMACIÓN";

  }else{

    btn.innerText =
      "CONFIRMAR MANTENIMIENTO";
  }
}

/* ===================================== */
/* GUARDAR */
/* ===================================== */

window.confirmarMantenimiento =
async function(){

  if(
    !selectedForklift ||
    !selectedDate ||
    !selectedTime
  ){

    alert("Complete toda la información");

    return;
  }

  try{

    if(agendamientoEditando){

      await updateDoc(

        doc(
          db,
          "AGENDAMIENTO",
          agendamientoEditando.firebaseId
        ),

        {

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora:
            selectedTime,

          estado:
            "PENDIENTE"
        }
      );

      mostrarNotificacion(
        "Programación actualizada"
      );

    }else{

      const existente =
        agendamientos.find(
          a => a.serie === selectedForklift.Serie
        );

      if(existente){

        alert(
          "Este equipo ya tiene programación"
        );

        return;
      }

      await addDoc(

        collection(db, "AGENDAMIENTO"),

        {

          serie:
            selectedForklift.Serie,

          modelo:
            selectedForklift.Modelo || "",

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora:
            selectedTime,

          estado:
            "PENDIENTE",

          fechaCreacion:
            new Date()
        }
      );

      mostrarNotificacion(
        "Mantenimiento agendado correctamente"
      );
    }

    selectedForklift = null;

    selectedDate = null;

    selectedTime = null;

    agendamientoEditando = null;

    actualizarResumen();

    await cargarDatos();

  }catch(error){

    console.log(error);

    alert("ERROR GUARDANDO");
  }
}

/* ===================================== */
/* NOTIFICACION */
/* ===================================== */

function mostrarNotificacion(texto){

  const n =
    document.getElementById("notification");

  n.innerText = texto;

  n.style.display = "block";

  setTimeout(() => {

    n.style.display = "none";

  }, 3000);
}

/* ===================================== */
/* TIEMPO REAL */
/* ===================================== */

onSnapshot(

  collection(db, "AGENDAMIENTO"),

  async () => {

    await cargarDatos();
  }
);
/* ===================================== */
/* CLIENTES */
/* ===================================== */

function renderClientes(){

  const select =
    document.getElementById("clienteSelect");

  // LIMPIAR
  select.innerHTML = "";

  // OBTENER CLIENTES UNICOS
  const clientes = [
    "TODOS",
    ...new Set(
      montacargas
        .map(e => e.Cliente)
        .filter(Boolean)
    )
  ];

  clientes.forEach((cliente) => {

    const option =
      document.createElement("option");

    option.value = cliente;

    option.innerText = cliente;

    select.appendChild(option);

  });

  select.value = clienteSeleccionado;

  // EVITAR MULTIPLES EVENTOS
  select.onchange = () => {

    clienteSeleccionado =
      select.value;

    renderForklifts();

    renderCalendario();

    document.getElementById(
      "agendaDia"
    ).innerHTML =
      "Seleccione un día del calendario";
  };
}
</script>

</body>

</html>
