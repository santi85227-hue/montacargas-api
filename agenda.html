<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamiento de Mantenimiento</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#1f2937;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.card h2{
    margin-bottom:15px;
    color:#2563eb;
}

.forklift-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.forklift-card{
    border:2px solid #e5e7eb;
    border-radius:12px;
    padding:16px;
    cursor:pointer;
    transition:0.3s;
}

.forklift-card:hover{
    border-color:#2563eb;
    transform:translateY(-2px);
}

.forklift-card.selected{
    border-color:#2563eb;
    background:#eff6ff;
}

.modelo{
    font-size:18px;
    font-weight:bold;
    color:#111827;
}

.serie{
    margin-top:8px;
    color:#4b5563;
}

.info{
    margin-top:5px;
    color:#6b7280;
    font-size:14px;
}

.estado-agenda{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:#f3f4f6;
    font-size:14px;
}

.estado-confirmado{
    background:#dcfce7;
    color:#166534;
}

.estado-pendiente{
    background:#fef3c7;
    color:#92400e;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    margin-top:20px;
}

.day{
    background:white;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    position:relative;
}

.day:hover{
    background:#dbeafe;
}

.day.selected{
    background:#2563eb;
    color:white;
}

.day.ocupado{
    background:#dcfce7;
    border:2px solid #16a34a;
}

.day.ocupado::after{
    content:"✓";
    position:absolute;
    top:5px;
    right:8px;
    font-size:12px;
    color:#16a34a;
    font-weight:bold;
}

.time-slots{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-top:20px;
}

.time-slot{
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.time-slot:hover{
    background:#dbeafe;
}

.time-slot.selected{
    background:#2563eb;
    color:white;
}

.time-slot.ocupado{
    background:#d1d5db;
    color:#6b7280;
    cursor:not-allowed;
    opacity:0.5;
}

.btn{
    margin-top:20px;
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
    width:100%;
}

.btn:hover{
    background:#1d4ed8;
}

.summary{
    background:#f9fafb;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}
    .agenda-item{

    border:1px solid #d1d5db;

    border-radius:12px;

    padding:15px;

    margin-bottom:10px;

    background:white;
}

.agenda-item h3{

    color:#2563eb;

    margin-bottom:8px;
}

.agenda-item p{

    margin:4px 0;
}

.notification{
    position:fixed;
    top:20px;
    right:20px;
    background:#16a34a;
    color:white;
    padding:16px 20px;
    border-radius:10px;
    display:none;
    z-index:999;
}

</style>

</head>

<body>

<div class="container">

<h1>🔧 Agendamiento de Mantenimiento</h1>

<div class="card">

<h2>1. Selecciona el equipo</h2>

<div class="forklift-grid" id="forkliftList"></div>

</div>

<div class="card">

<h2>2. Selecciona el día</h2>

<div class="calendar" id="calendar"></div>

</div>
<div class="card">
    <h2>📅 Programación del Día</h2>
    <div id="agendaDia">
        Seleccione un día del calendario
    </div>
</div>

<div class="card">

<h2>3. Selecciona la hora</h2>

<div class="time-slots" id="timeSlots"></div>

</div>

<div class="card">

<h2>4. Confirmación</h2>

<div class="summary" id="summary">

Seleccione información...

</div>

<button class="btn" onclick="confirmarMantenimiento()">

CONFIRMAR MANTENIMIENTO

</div>

</div>

```html
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  doc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===================================== */
/* FIREBASE */
/* ===================================== */

const firebaseConfig = {

  apiKey: "AIzaSyCWxAs_JLDo0tX80wMe1rlHFx6hCU79DwQ",

  authDomain: "montacargas-tecnicos.firebaseapp.com",

  projectId: "montacargas-tecnicos",

  storageBucket: "montacargas-tecnicos.firebasestorage.app",

  messagingSenderId: "321697235731",

  appId: "1:321697235731:web:d54b1bf957d3a95641d0e6"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ===================================== */
/* VARIABLES */
/* ===================================== */

let montacargas = [];

let agendamientos = [];

let selectedForklift = null;

let selectedDate = null;

let selectedTime = null;

/* ===================================== */
/* CARGAR TODO */
/* ===================================== */

async function cargarDatos(){

  await cargarEquipos();

  await cargarAgendamientos();

  renderForklifts();

  renderCalendarioAgendado();
}

cargarDatos();

/* ===================================== */
/* EQUIPOS */
/* ===================================== */

async function cargarEquipos(){

  const snapshot =
    await getDocs(collection(db, "Equipos"));

  montacargas = [];

  snapshot.forEach((docu) => {

    montacargas.push({

      id: docu.id,

      ...docu.data()
    });
  });
}

/* ===================================== */
/* AGENDAMIENTOS */
/* ===================================== */

async function cargarAgendamientos(){

  const snapshot =
    await getDocs(collection(db, "AGENDAMIENTO"));

  agendamientos = [];

  snapshot.forEach((docu) => {

    agendamientos.push({

      firebaseId: docu.id,

      ...docu.data()
    });
  });
}

/* ===================================== */
/* MOSTRAR EQUIPOS */
/* ===================================== */

function renderForklifts(){

  const container =
    document.getElementById("forkliftList");

  container.innerHTML = "";

  montacargas.forEach((f) => {

    const yaProgramado =
      agendamientos.find(
        a =>
          a.serie === f.Serie &&
          (
            a.estado === "PENDIENTE" ||
            a.estado === "APROBADO"
          )
      );

    if(yaProgramado){
      return;
    }

    container.innerHTML += `

      <div
        class="forklift-card"
        id="equipo-${f.Serie}"
      >

        <div class="modelo">
          ${f.Modelo || "-"}
        </div>

        <div class="serie">
          SERIAL: ${f.Serie}
        </div>

        <div class="info">
          Royal: ${f.Royal || "-"}
        </div>

        <div class="info">
          Estado: ${f.Estado || "-"}
        </div>

      </div>

    `;
  });

  montacargas.forEach((f) => {

    const card =
      document.getElementById(`equipo-${f.Serie}`);

    if(!card) return;

    card.addEventListener("click", () => {

      document
        .querySelectorAll(".forklift-card")
        .forEach((c) => {

          c.classList.remove("selected");
        });

      card.classList.add("selected");

      selectedForklift = f;

      actualizarResumen();
    });
  });
}

/* ===================================== */
/* CALENDARIO */
/* ===================================== */

const calendar =
  document.getElementById("calendar");

const hoy = new Date();

const year = hoy.getFullYear();

const month =
  String(hoy.getMonth() + 1).padStart(2,"0");

for(let i=1; i<=31; i++){

  const day =
    document.createElement("div");

  day.className = "day";

  day.id = `dia-${i}`;

  day.innerHTML = `

    <div>${i}</div>

    <small
      id="agenda-${i}"
      style="
        display:block;
        margin-top:5px;
        font-size:10px;
      "
    ></small>

  `;

  day.addEventListener("click", () => {

    document
      .querySelectorAll(".day")
      .forEach((d) => {

        d.classList.remove("selected");
      });

    day.classList.add("selected");

    selectedDate =
      `${year}-${month}-${String(i).padStart(2,'0')}`;

    actualizarResumen();

    cargarHorariosOcupados();

    mostrarAgendaDelDia(selectedDate);
  });

  calendar.appendChild(day);
}

/* ===================================== */
/* CALENDARIO AGENDADO */
/* ===================================== */

function renderCalendarioAgendado(){

  for(let i=1; i<=31; i++){

    const agenda =
      document.getElementById(`agenda-${i}`);

    if(agenda){

      agenda.innerHTML = "";
    }

    const dia =
      document.getElementById(`dia-${i}`);

    if(dia){

      dia.classList.remove("ocupado");
    }
  }

  agendamientos.forEach((a) => {

    if(!a.fecha?.seconds) return;

    const fecha =
      new Date(a.fecha.seconds * 1000);

    const dia =
      fecha.getDate();

    const agenda =
      document.getElementById(`agenda-${dia}`);

    const divDia =
      document.getElementById(`dia-${dia}`);

    if(agenda){

      agenda.innerHTML += `

        <div>
          ${a.hora}
        </div>

      `;

      agenda.style.color = "red";
    }

    if(divDia){

      divDia.classList.add("ocupado");
    }
  });
}

/* ===================================== */
/* HORARIOS */
/* ===================================== */

const horas = [

  "08:00",
  "09:00",
  "10:00",
  "11:00",
  "14:00",
  "15:00",
  "16:00"
];

const timeSlots =
  document.getElementById("timeSlots");

horas.forEach((hora) => {

  const div =
    document.createElement("div");

  div.className = "time-slot";

  div.dataset.hora = hora;

  div.innerText = hora;

  div.addEventListener("click", () => {

    if(div.classList.contains("ocupado")){
      return;
    }

    document
      .querySelectorAll(".time-slot")
      .forEach((t) => {

        t.classList.remove("selected");
      });

    div.classList.add("selected");

    selectedTime = hora;

    actualizarResumen();
  });

  timeSlots.appendChild(div);
});

/* ===================================== */
/* HORARIOS OCUPADOS */
/* ===================================== */

function cargarHorariosOcupados(){

  document
    .querySelectorAll(".time-slot")
    .forEach((btn) => {

      btn.classList.remove("ocupado");

      btn.style.pointerEvents = "auto";
    });

  agendamientos.forEach((a) => {

    if(!a.fecha?.seconds) return;

    const fecha =
      new Date(a.fecha.seconds * 1000);

    const fechaLocal = new Date(
      fecha.getTime() -
      fecha.getTimezoneOffset() * 60000
    );

    const fechaTexto =
      fechaLocal.toISOString().split("T")[0];

    if(fechaTexto === selectedDate){

      document
        .querySelectorAll(".time-slot")
        .forEach((btn) => {

          if(btn.dataset.hora === a.hora){

            btn.classList.add("ocupado");

            btn.style.pointerEvents = "none";
          }
        });
    }
  });
}

/* ===================================== */
/* RESUMEN */
/* ===================================== */

function actualizarResumen(){

  const summary =
    document.getElementById("summary");

  summary.innerHTML = `

    <p>
      <strong>Equipo:</strong>
      ${selectedForklift?.Modelo || "-"}
    </p>

    <p>
      <strong>Serie:</strong>
      ${selectedForklift?.Serie || "-"}
    </p>

    <p>
      <strong>Fecha:</strong>
      ${selectedDate || "-"}
    </p>

    <p>
      <strong>Hora:</strong>
      ${selectedTime || "-"}
    </p>

  `;
}

/* ===================================== */
/* GUARDAR */
/* ===================================== */

window.confirmarMantenimiento =
async function(){

  if(
    !selectedForklift ||
    !selectedDate ||
    !selectedTime
  ){

    alert("Complete toda la información");

    return;
  }

  try{

    const existente =
      agendamientos.find(
        a => a.serie === selectedForklift.Serie
      );

    if(existente){

      await updateDoc(

        doc(
          db,
          "AGENDAMIENTO",
          existente.firebaseId
        ),

        {

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora: selectedTime,

          estado: "PENDIENTE"
        }
      );

    }else{

      await addDoc(

        collection(db, "AGENDAMIENTO"),

        {

          serie:
            selectedForklift.Serie,

          modelo:
            selectedForklift.Modelo || "",

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora:
            selectedTime,

          estado:
            "PENDIENTE",

          fechaCreacion:
            new Date()
        }
      );
    }

    mostrarNotificacion(
      "Mantenimiento agendado correctamente"
    );

    selectedForklift = null;

    selectedDate = null;

    selectedTime = null;

    actualizarResumen();

    await cargarDatos();

  }catch(error){

    console.log(error);

    alert("ERROR GUARDANDO");
  }
}

/* ===================================== */
/* AGENDA DEL DIA */
/* ===================================== */

function mostrarAgendaDelDia(fechaTexto){

  const container =
    document.getElementById("agendaDia");

  const agendasDelDia = [];

  agendamientos.forEach((a) => {

    if(!a.fecha?.seconds) return;

    const fecha =
      new Date(a.fecha.seconds * 1000);

    const fechaLocal = new Date(
      fecha.getTime() -
      fecha.getTimezoneOffset() * 60000
    );

    const fechaAgenda =
      fechaLocal.toISOString().split("T")[0];

    if(fechaAgenda === fechaTexto){

      agendasDelDia.push(a);
    }
  });

  if(agendasDelDia.length === 0){

    container.innerHTML = `

      <p>
        No existen mantenimientos programados
      </p>

    `;

    return;
  }

  agendasDelDia.sort((a,b) => {

    return a.hora.localeCompare(b.hora);

  });

  container.innerHTML = "";

  agendasDelDia.forEach((a) => {

    container.innerHTML += `

      <div class="agenda-item">

        <h3>${a.hora}</h3>

        <p>
          <strong>Serie:</strong>
          ${a.serie}
        </p>

        <p>
          <strong>Modelo:</strong>
          ${a.modelo}
        </p>

        <p>
          <strong>Estado:</strong>
          ${a.estado}
        </p>

      </div>

    `;
  });
}

/* ===================================== */
/* NOTIFICACION */
/* ===================================== */

function mostrarNotificacion(texto){

  const n =
    document.getElementById("notification");

  n.innerText = texto;

  n.style.display = "block";

  setTimeout(() => {

    n.style.display = "none";

  }, 3000);
}

/* ===================================== */
/* TIEMPO REAL */
/* ===================================== */

onSnapshot(
  collection(db, "AGENDAMIENTO"),
  async () => {

    await cargarDatos();

    if(selectedDate){

      mostrarAgendaDelDia(selectedDate);

      cargarHorariosOcupados();
    }
  }
);

</script>
