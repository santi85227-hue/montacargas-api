<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIMORA - Plataforma de Monitoreo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0b1633;
    height:100vh;
    overflow:hidden;
}

.layout{
    display:flex;
    height:100vh;
}

/* MENU IZQUIERDO */

.sidebar{
    width:220px;
    background:#101d3d;
    padding:15px;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    overflow-x:hidden;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:8px;
}
.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    font-size:24px;
}

.logo p{
    font-size:12px;
    color:#9ca3af;
}
.menu-item{
    background:#1c2948;
    color:white;
    padding:12px;
    font-size:15px;
    border-radius:8px;
    cursor:pointer;
    border-left:4px solid transparent;
}

.menu-item h3{
    font-size:18px;
    margin-bottom:2px;
    color:#2ea8ff;
}

.menu-item p{
    font-size:12px;
    color:#d1d5db;
    line-height:1.2;
}

.menu-item:hover{
    background:#24365f;
}

.menu-item.active{
    border-left:4px solid #2ea8ff;
    background:#24365f;
}


/* CONTENIDO */

.content{
    flex:1;
    background:#f4f6f9;
    padding:20px;
    overflow:auto;
}

.header{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.header h2{
    color:#111827;
}

.contenedorVista{
    background:white;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    overflow:hidden;
}

iframe{
    width:100%;
    height:calc(100vh - 180px);
    border:none;
}

</style>

</head>

<body>

<div class="layout">

    <!-- MENU -->

    <div class="sidebar">

        <div class="logo">
            <h1>ROYAL RENTAL</h1>
            <p>SIMORA</p>
        </div>

        <div class="menu">

            <div class="menu-item" onclick="cargarVista(this,'equipos.html')">
                🚜 Equipos
            </div>

            <div class="menu-item" onclick="cargarVista(this,'ordenes.html')">
                📋 Órdenes
            </div>

            <div class="menu-item" onclick="cargarVista(this,'mapa.html')">
               📍 Mapa
            </div>

            <div class="menu-item" onclick="cargarVista(this,'preventivos.html')">
                🔧 Preventivos
            </div>

            <div class="menu-item" onclick="cargarVista(this,'dashboard.html')">
                📊 Dashboard
            </div>

            <div class="menu-item" onclick="cargarVista(this,'crearEquipos.html')">
                ➕ Crear Equipos
            </div>

        </div>

    </div>

    <!-- CONTENIDO -->

    <div class="content">

        <div class="header">

            <h2 id="tituloVista">
                Equipos
            </h2>

        </div>

        <div class="contenedorVista">

            <iframe
                id="visor"
                src="equipos.html">
            </iframe>

        </div>

    </div>

</div>

<script>

function cargarVista(elemento,url){

    document
        .querySelectorAll(".menu-item")
        .forEach(item=>{
            item.classList.remove("active");
        });

    elemento.classList.add("active");

    document
        .getElementById("visor")
        .src = url;

    document
        .getElementById("tituloVista")
        .innerText =
            elemento.querySelector("h3").innerText;
}

</script>

</body>

</html>
