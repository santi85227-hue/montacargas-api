<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cargue Masivo Equipos</title>

<style>

body{
    zoom: 0.65;
    font-family:Arial;
    background:#f4f6f9;
    padding:30px;
}

.card{
    background:white;
    padding:30px;
    border-radius:16px;
    max-width:700px;
    margin:auto;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:20px;
}

input{
    margin:20px 0;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#resultado{
    margin-top:20px;
    padding:15px;
    background:#ecfdf5;
    border-radius:10px;

</style>

</head>

<body>

<div class="card">

<h1>📥 Cargue Masivo de Equipos</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<button onclick="cargarExcel()">

SUBIR EQUIPOS

</button>

<div id="resultado"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">

/* ==================================== */
/* FIREBASE */
/* ==================================== */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  addDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ==================================== */
/* CONFIG */
/* ==================================== */

const firebaseConfig = {

  apiKey: "AIzaSyCWxAs_JLDo0tX80wMe1rlHFx6hCU79DwQ",

  authDomain: "montacargas-tecnicos.firebaseapp.com",

  projectId: "montacargas-tecnicos",

  storageBucket: "montacargas-tecnicos.firebasestorage.app",

  messagingSenderId: "321697235731",

  appId: "1:321697235731:web:d54b1bf957d3a95641d0e6"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* ==================================== */
/* CARGAR EXCEL */
/* ==================================== */

window.cargarExcel = async function(){

  const file =
    document.getElementById("excelFile").files[0];

  if(!file){

    alert("Seleccione un archivo");

    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){

    const data = new Uint8Array(e.target.result);

    const workbook =
      XLSX.read(data, { type: "array" });

    const sheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const json =
      XLSX.utils.sheet_to_json(sheet);

    let total = 0;

    for(const row of json){

      try{

        await addDoc(

          collection(db, "Equipos"),

          {

            Serie:
              row.Serie || "",

            Modelo:
              row.Modelo || "",

            Royal:
              row.Royal || "",

            Cliente:
              row.Cliente || "",

            Distrito:
              row.Distrito || "",

            Zona:
              row.Zona || "",

            TipoContrato:
              row.TipoContrato || "",

            Estado:
              row.Estado || "OPERATIVO",

            Activo:
              String(row.Activo).toUpperCase() === "TRUE",

            Horometro1:
              Number(row.Horometro1 || 0),

            Horometro2:
              Number(row.Horometro2 || 0),

            Horometro3:
              Number(row.Horometro3 || 0),

            Horometro4:
              Number(row.Horometro4 || 0)

          }

        );

        total++;

      }catch(error){

        console.log(error);

      }

    }

    document.getElementById("resultado")
    .innerHTML = `

      ✅ Equipos cargados:
      <strong>${total}</strong>

    `;

  };

  reader.readAsArrayBuffer(file);

}

    /* ===================================== */
/* CALENDARIO REAL */
/* LUNES A DOMINGO */
/* ===================================== */

function renderCalendario(){

  const calendar =
    document.getElementById("calendar");

  calendar.innerHTML = "";

  // AÑO Y MES
  const year = 2026;
  const month = 4; // MAYO = 4

  // PRIMER DIA DEL MES
  const primerDia =
    new Date(year, month, 1);

  // ULTIMO DIA
  const ultimoDia =
    new Date(year, month + 1, 0);

  const totalDias =
    ultimoDia.getDate();

  // AJUSTAR PARA QUE LUNES SEA EL PRIMERO
  let inicioSemana =
    primerDia.getDay();

  if(inicioSemana === 0){
    inicioSemana = 7;
  }

  // TITULOS
  const diasSemana = [
    "LUN",
    "MAR",
    "MIE",
    "JUE",
    "VIE",
    "SAB",
    "DOM"
  ];

  diasSemana.forEach((dia) => {

    const header =
      document.createElement("div");

    header.style.fontWeight = "bold";
    header.style.textAlign = "center";
    header.style.padding = "10px";
    header.style.color = "#2563eb";

    header.innerText = dia;

    calendar.appendChild(header);

  });

  // ESPACIOS VACIOS
  for(let i=1; i<inicioSemana; i++){

    const empty =
      document.createElement("div");

    calendar.appendChild(empty);

  }

  // DIAS DEL MES
  for(let i=1; i<=totalDias; i++){

    const fechaTexto =
      `2026-05-${String(i).padStart(2,'0')}`;

    const agendasDia =
      agendamientos.filter((a) => {

        if(!a.fecha?.seconds) return false;

        const fecha =
          new Date(a.fecha.seconds * 1000);

        const fechaAgenda =
          fecha.toISOString().split("T")[0];

        return fechaAgenda === fechaTexto;

      });

    const day =
      document.createElement("div");

    day.className = "day";

    if(agendasDia.length > 0){

      day.classList.add("ocupado");

    }

    day.innerHTML = `

      <div class="day-numero">
        ${i}
      </div>

      <div class="day-agenda">
        ${agendasDia.length} agenda(s)
      </div>

    `;

    day.addEventListener("click", () => {

      document
        .querySelectorAll(".day")
        .forEach((d) => {

          d.classList.remove("selected");

        });

      day.classList.add("selected");

      selectedDate = fechaTexto;

      selectedTime = null;

      document
        .querySelectorAll(".time-slot")
        .forEach((t) => {

          t.classList.remove("selected");

        });

      actualizarResumen();

      mostrarAgendaDelDia(fechaTexto);

      cargarHorariosOcupados();

    });

    calendar.appendChild(day);

  }

}

    /* ===================================== */
/* MOSTRAR PROGRAMACION DEL DIA */
/* CON EDICION */
/* ===================================== */

function mostrarAgendaDelDia(fechaTexto){

  const container =
    document.getElementById("agendaDia");

  const agendasDelDia =
    agendamientos.filter((a) => {

      if(!a.fecha?.seconds) return false;

      const fecha =
        new Date(a.fecha.seconds * 1000);

      const fechaAgenda =
        fecha.toISOString().split("T")[0];

      return fechaAgenda === fechaTexto;

    });

  if(agendasDelDia.length === 0){

    container.innerHTML = `

      <div class="sin-equipos">

        No existen mantenimientos programados

      </div>

    `;

    return;

  }

  agendasDelDia.sort((a,b) => {

    return a.hora.localeCompare(b.hora);

  });

  container.innerHTML = "";

  agendasDelDia.forEach((a) => {

    container.innerHTML += `

      <div
        class="agenda-item"
        onclick="editarAgenda('${a.firebaseId}')"
        style="cursor:pointer"
      >

        <h3>${a.hora}</h3>

        <p>
          <strong>Serie:</strong>
          ${a.serie}
        </p>

        <p>
          <strong>Modelo:</strong>
          ${a.modelo}
        </p>

        <p>
          <strong>Estado:</strong>
          ${a.estado}
        </p>

        <br>

        <small style="color:#2563eb">

          Click para modificar programación

        </small>

      </div>

    `;

  });

}

    /* ===================================== */
/* EDITAR PROGRAMACION */
/* ===================================== */

window.editarAgenda = async function(firebaseId){

  const agenda =
    agendamientos.find(
      a => a.firebaseId === firebaseId
    );

  if(!agenda){
    return;
  }

  // BUSCAR EQUIPO
  const equipo =
    montacargas.find(
      e => e.Serie === agenda.serie
    );

  if(!equipo){
    return;
  }

  selectedForklift = equipo;

  selectedTime = agenda.hora;

  // FECHA
  if(agenda.fecha?.seconds){

    const fecha =
      new Date(
        agenda.fecha.seconds * 1000
      );

    selectedDate =
      fecha.toISOString().split("T")[0];

  }

  // MARCAR HORARIO
  document
    .querySelectorAll(".time-slot")
    .forEach((slot) => {

      slot.classList.remove("selected");

      if(slot.dataset.hora === selectedTime){

        slot.classList.add("selected");

      }

    });

  actualizarResumen();

  cargarHorariosOcupados();

  mostrarNotificacion(
    "Modo edición activado"
  );

}

    /* ===================================== */
/* CONFIRMAR */
/* ACTUALIZA SI EXISTE */
/* ===================================== */

window.confirmarMantenimiento =
async function(){

  if(
    !selectedForklift ||
    !selectedDate ||
    !selectedTime
  ){

    alert("Complete toda la información");

    return;

  }

  try{

    const existente =
      agendamientos.find(
        a => a.serie === selectedForklift.Serie
      );

    if(existente){

      // ACTUALIZAR
      await updateDoc(

        doc(
          db,
          "AGENDAMIENTO",
          existente.firebaseId
        ),

        {

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora:
            selectedTime,

          estado:
            "PENDIENTE"

        }

      );

      mostrarNotificacion(
        "Programación actualizada"
      );

    }else{

      // CREAR
      await addDoc(

        collection(db, "AGENDAMIENTO"),

        {

          serie:
            selectedForklift.Serie,

          modelo:
            selectedForklift.Modelo || "",

          fecha:
            new Date(
              selectedDate + "T00:00:00"
            ),

          hora:
            selectedTime,

          estado:
            "PENDIENTE",

          fechaCreacion:
            new Date()

        }

      );

      mostrarNotificacion(
        "Mantenimiento agendado"
      );

    }

    selectedForklift = null;
    selectedDate = null;
    selectedTime = null;

    actualizarResumen();

    await cargarDatos();

  }catch(error){

    console.log(error);

    alert("ERROR GUARDANDO");

  }

}

</script>

</body>
</html>
